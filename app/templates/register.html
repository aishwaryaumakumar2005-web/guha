<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
Register - Guha Academy</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Core Custom Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=53">
    <style>
        body.login-body {            background: linear-gradient(135deg, #131521 0%, #171b2d 100%);            min-height: 100vh;            display: flex;            align-items: center;            justify-content: center;            padding: 20px;        }        .login-card {            max-width: 460px;            width: 100%;            background: #1e2235;            border-radius: 24px;            border: 1px solid rgba(255,255,255,0.08);            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);            backdrop-filter: blur(10px);            padding: 40px;        }        .login-logo {            font-size: 2.2rem;            font-weight: 800;            color: #FFD700;            font-family: var(--font-heading);            letter-spacing: -0.02em;            margin-bottom: 8px;        }        .login-logo i {            color: #FF8C00 !important;        }        .alert {            color: #8B0000 !important;            background-color: #ffffff !important;            border-color: #8B0000 !important;        }        .alert small {            color: #8B0000 !important;        }        @media (max-width: 576px) {            .login-card { padding: 28px 20px; margin: 12px; }            .login-logo { font-size: 1.8rem; }            body.login-body { padding: 10px; align-items: flex-start; padding-top: 40px; }        }    </style>
</head>
<body class="login-body">
    <div class="login-card animate-fade-in">
        <div class="text-center mb-4">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="GUHA" class="brand-logo-img" style="height:92px;width:auto">
            </div>
            <h5 class="text-white fw-semibold uppercase tracking-wider small">
Create Staff Account</h5>
        </div>
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}            {% if messages %}                {% for category, message in messages %}                    <div class="alert alert-{{ category }} alert-dismissible fade show border-0 mb-4" role="alert">
                        <small class="fw-medium">
{{ message }}</small>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">
</button>
                    </div>
                {% endfor %}            {% endif %}        {% endwith %}        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3">
                <label for="name" class="form-label text-white fw-medium small">
Full Name</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0 border-color">
<i class="bi bi-person-badge text-muted">
</i>
</span>
                    <input type="text" class="form-control border-start-0 ps-0" id="name" name="name" placeholder="Enter your full name" maxlength="100" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label text-white fw-medium small">
Email Address</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0 border-color">
<i class="bi bi-envelope text-muted">
</i>
</span>
                    <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="name@example.com" maxlength="100" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="username" class="form-label text-white fw-medium small">
Username</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0 border-color">
<i class="bi bi-person text-muted">
</i>
</span>
                    <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Choose a username" required>
                </div>
            </div>
                        <div class="mb-3">
                <label for="password" class="form-label text-white fw-medium small">
Password</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0 border-color">
<i class="bi bi-lock text-muted">
</i>
</span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Create password" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label text-white fw-medium small">
Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0 border-color">
<i class="bi bi-shield-lock text-muted">
</i>
</span>
                    <input type="password" class="form-control border-start-0 ps-0" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-premium w-100 py-2 fs-6 mb-3">
                Register <i class="bi bi-person-plus ms-1">
</i>
            </button>
        </form>
        <div class="text-center mt-3">
            <p class="text-white small mb-0">
Already have an account? <a href="{{ url_for('auth.login') }}" class="fw-bold" style="color: var(--accent-cyan); text-decoration: none;">
Sign In</a>
</p>
        </div>
    </div>
    <!-- Bootstrap 5 Bundle JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var pw = document.querySelector('input[name="password"]');
    var cpw = document.querySelector('input[name="confirm_password"]');
    if (pw && cpw) {
        cpw.addEventListener('input', function() {
            if (pw.value !== cpw.value) {
                cpw.setCustomValidity('Passwords do not match');
            } else {
                cpw.setCustomValidity('');
            }
        });
        pw.addEventListener('input', function() {
            if (cpw.value && pw.value !== cpw.value) {
                cpw.setCustomValidity('Passwords do not match');
            } else {
                cpw.setCustomValidity('');
            }
        });
    }
});
</script>
</body>
</html>
